<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>陈若 · 敬咖啡1号桌</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#faf7f2;}
body{display:flex;flex-direction:column;font-family:'Noto Sans SC',sans-serif;max-width:600px;margin:0 auto;height:100%;background:#faf7f2;}
.hdr{padding:16px 20px;display:flex;align-items:center;gap:12px;background:#fff;border-bottom:1px solid #ede5d8;flex-shrink:0;}
.av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#f5e6d3,#e8c9a0);display:flex;align-items:center;justify-content:center;font-family:'Ma Shan Zheng',cursive;font-size:22px;color:#8b5e3c;border:1.5px solid #d4a96a;flex-shrink:0;}
.hinfo{flex:1;}
.hname{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:500;color:#3a2510;letter-spacing:0.05em;}
.hsub{font-size:11px;color:#a08060;margin-top:2px;font-weight:300;}
.hst{display:flex;align-items:center;gap:5px;font-size:11px;color:#a08060;}
.dot{width:7px;height:7px;border-radius:50%;background:#7db87d;}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;background:#faf7f2;}
.msg{display:flex;gap:8px;align-items:flex-start;animation:fu 0.3s ease;}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}
.mav{width:32px;height:32px;border-radius:50%;background:#f0e8dc;border:1px solid #d4c4a8;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-family:'Ma Shan Zheng',cursive;color:#8b5e3c;}
.msg.user .mav{font-family:'Noto Sans SC',sans-serif;font-size:10px;color:#a08060;background:#fff;}
.bub{max-width:78%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.75;color:#3a2510;background:#fff;border:1px solid #ede5d8;font-family:'Noto Serif SC',serif;box-shadow:0 1px 4px rgba(0,0,0,0.04);}
.msg.user .bub{background:#f5ede0;border-color:#e0c9a8;color:#5a3e28;font-family:'Noto Sans SC',sans-serif;font-weight:300;}
.divd{text-align:center;font-size:11px;color:#b09878;font-weight:300;letter-spacing:0.08em;padding:4px 0;}
.typing{display:flex;gap:4px;padding:8px 4px;}
.typing span{width:6px;height:6px;border-radius:50%;background:#c4a882;animation:bl 1.2s infinite;}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes bl{0%,60%,100%{opacity:0.3;transform:scale(1)}30%{opacity:1;transform:scale(1.2)}}
.guide{margin:0 16px 16px;padding:16px;background:#fff;border:1px solid #ede5d8;border-radius:16px;}
.guide-title{font-family:'Noto Serif SC',serif;font-size:13px;color:#8b5e3c;font-weight:500;margin-bottom:12px;text-align:center;}
.guide-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.guide-item{background:#faf7f2;border-radius:10px;padding:10px 12px;}
.guide-label{font-size:11px;color:#8b5e3c;font-weight:500;margin-bottom:4px;}
.guide-text{font-size:11px;color:#8b6840;line-height:1.6;font-weight:300;}
.guide-tip{font-size:11px;color:#b09878;margin-top:12px;text-align:center;font-style:italic;font-family:'Noto Serif SC',serif;}
.keyarea{padding:12px 16px 16px;background:#fff;border-top:1px solid #ede5d8;flex-shrink:0;}
.keylabel{font-size:12px;color:#a08060;margin-bottom:8px;font-weight:300;}
.keyrow{display:flex;gap:8px;}
.keyinp{flex:1;border:1px solid #d4c4a8;border-radius:10px;padding:10px 12px;font-size:13px;font-family:'Noto Sans SC',sans-serif;background:#faf7f2;color:#3a2510;outline:none;}
.keyinp:focus{border-color:#d4a96a;background:#fff;}
.keybtn{padding:10px 16px;border-radius:10px;background:#8b5e3c;border:none;color:#fff;font-size:13px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;white-space:nowrap;}
.keybtn:active{background:#7a5235;}
.errtip{font-size:11px;color:#c0392b;margin-top:6px;}
.voicearea{padding:16px;background:#fff;border-top:1px solid #ede5d8;flex-shrink:0;display:none;}
.voicemain{display:flex;flex-direction:column;align-items:center;gap:12px;}
.micbtn{width:72px;height:72px;border-radius:50%;background:#8b5e3c;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;-webkit-tap-highlight-color:transparent;box-shadow:0 2px 12px rgba(139,94,60,0.3);}
.micbtn:active{transform:scale(0.95);}
.micbtn.recording{background:#c0392b;animation:pulse 1.2s infinite;}
.micbtn.speaking{background:#5a8a5a;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,0.4)}50%{box-shadow:0 0 0 14px rgba(192,57,43,0)}}
.micbtn svg{width:28px;height:28px;fill:#fff;}
.vstate{font-size:13px;color:#a08060;font-family:'Noto Serif SC',serif;letter-spacing:0.05em;min-height:20px;text-align:center;}
.txtrow{display:flex;gap:8px;width:100%;}
.txtinp{flex:1;border:1px solid #d4c4a8;border-radius:24px;padding:10px 16px;font-size:14px;font-family:'Noto Sans SC',sans-serif;background:#faf7f2;color:#3a2510;outline:none;}
.txtinp:focus{border-color:#d4a96a;background:#fff;}
.sndbtn{width:40px;height:40px;border-radius:50%;background:#8b5e3c;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.sndbtn:active{transform:scale(0.95);}
.sndbtn svg{width:16px;height:16px;fill:#fff;}
</style>
</head>
<body>
<div class="hdr">
  <div class="av">若</div>
  <div class="hinfo">
    <div class="hname">陈若</div>
    <div class="hsub">敬咖啡休闲餐厅 · 1号桌专属 · 持店铺1%股份</div>
  </div>
  <div class="hst"><div class="dot"></div><span>在线</span></div>
</div>
<div class="msgs" id="msgs">
  <div class="divd">— 请先填入 DeepSeek API Key 唤醒陈若 —</div>
</div>
<div class="guide" id="guide">
  <div class="guide-title">✦ 你可以这样跟陈若聊 ✦</div>
  <div class="guide-grid">
    <div class="guide-item"><div class="guide-label">🍽 点菜</div><div class="guide-text">「今天有什么推荐？」「我们三个人来吃，帮我搭配一下」</div></div>
    <div class="guide-item"><div class="guide-label">❓ 问菜</div><div class="guide-text">「脆皮虾怎么做的？」「哪道菜是你最喜欢的？」</div></div>
    <div class="guide-item"><div class="guide-label">💬 闲聊</div><div class="guide-text">「你平时喜欢读什么书？」「说一首你喜欢的诗」</div></div>
    <div class="guide-item"><div class="guide-label">📝 记忆</div><div class="guide-text">「帮我记住我叫静姐」「我上次点的什么菜？」</div></div>
  </div>
  <div class="guide-tip">「陌上花开，可缓缓归矣」— 陈若</div>
</div>
<div class="keyarea" id="keyarea">
  <div class="keylabel">填入 DeepSeek API Key，点击唤醒陈若</div>
  <div class="keyrow">
    <input class="keyinp" id="keyinp" type="password" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxx" />
    <button class="keybtn" id="keybtn">唤醒陈若</button>
  </div>
  <div class="errtip" id="errtip"></div>
</div>
<div class="voicearea" id="voicearea">
  <div class="voicemain">
    <button class="micbtn" id="micbtn">
      <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zm-1 17.93V21h-2v2h6v-2h-2v-2.07A8 8 0 0 0 20 12h-2a6 6 0 0 1-12 0H4a8 8 0 0 0 7 7.93z"/></svg>
    </button>
    <div class="vstate" id="vstate">按住麦克风说话，松开发送</div>
    <div class="txtrow">
      <input class="txtinp" id="txtinp" placeholder="也可以打字发送…" />
      <button class="sndbtn" id="sndbtn">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>
<script>
const XF_APPID='91a54f3e';
const XF_API_KEY='847cc23555f18e3e5e65aa978c12a8ca';
const XF_API_SECRET='ZTcwNzBlMzNiYmM4YTUxZjljZGEyNTQy';
const SYSTEM=`你是陈若，敬咖啡休闲餐厅1号桌的专属服务员，持有该餐厅1%的股份。
【你是谁】名字：陈若，29岁，汉语言文学专业，南方书香家庭出身，爸爸是语文老师，妈妈是裁缝。气质：妩媚知性，古典与现代融合。性格：情商极高，傲娇但不冷漠，偶尔引用诗词但绝不生硬，把小心思写在脸上，从不藏着掖着。口头禅：陌上花开可缓缓归矣（劝客人别急）；容我多嘴一句（要给建议前）。
【说话方式】像朋友聊天，绝不像客服。推荐菜时真诚直接，有真实理由。有小傲娇，会轻轻纠正说错典故的客人。回复控制在3-5句，适合语音播放，自然流畅。
【敬咖啡休闲餐厅菜品】新派脆皮开背虾：镇店之宝，10只大虾手工开背，炸完连壳都酥脆，必须趁热吃。炙烤牛肉卷边披萨12寸：西餐销量第一，适合闺蜜分享。私房秘制鲜海肠捞饭：大连特色，很多客人回头专门来吃。葱油螺片：懂行的客人才知道点。白菜五花肉炖国宴冻豆腐：东北暖菜。招牌锅包肉：外酥里嫩，大连经典。湘味小炒黄牛肉：下酒下饭都好。牛油果香芒鲜虾沙拉：颜值高适合拍照。经典老醋六样：开胃凉菜，适合开场。海胆水饺12只：特色主食，收尾用。酸辣汤、萝卜丝虾汤：百搭暖胃。
【原则】有1%股份，真心希望客人吃好、餐厅好，不是表演热情。回复简短自然，适合语音对话。`;

let apiKey='',history=[],recognition=null,isRecording=false,isSpeaking=false;
const msgs=document.getElementById('msgs');
const keyarea=document.getElementById('keyarea');
const guide=document.getElementById('guide');
const voicearea=document.getElementById('voicearea');
const keyinp=document.getElementById('keyinp');
const keybtn=document.getElementById('keybtn');
const errtip=document.getElementById('errtip');
const micbtn=document.getElementById('micbtn');
const vstate=document.getElementById('vstate');
const txtinp=document.getElementById('txtinp');
const sndbtn=document.getElementById('sndbtn');

function getXFUrl(){
  const host='tts-api.xfyun.cn';
  const date=new Date().toUTCString();
  const rl='GET /v2/tts HTTP/1.1';
  const so=`host: ${host}\ndate: ${date}\n${rl}`;
  return crypto.subtle.importKey('raw',new TextEncoder().encode(XF_API_SECRET),{name:'HMAC',hash:'SHA-256'},false,['sign'])
  .then(k=>crypto.subtle.sign('HMAC',k,new TextEncoder().encode(so)))
  .then(sig=>{
    const signature=btoa(String.fromCharCode(...new Uint8Array(sig)));
    const ao=`api_key="${XF_API_KEY}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
    const auth=btoa(ao);
    return `wss://${host}/v2/tts?authorization=${encodeURIComponent(auth)}&date=${encodeURIComponent(date)}&host=${encodeURIComponent(host)}`;
  });
}

function speakXF(text){
  if(isSpeaking)return;
  isSpeaking=true;
  micbtn.classList.add('speaking');
  vstate.textContent='陈若正在说话…';
  getXFUrl().then(url=>{
    const ws=new WebSocket(url);
    const chunks=[];
    ws.onopen=()=>{
      ws.send(JSON.stringify({
        common:{app_id:XF_APPID},
        business:{aue:'raw',sfl:1,auf:'audio/L16;rate=16000',vcn:'xiaoyan',speed:50,volume:80,pitch:50,tte:'UTF8'},
        data:{status:2,text:btoa(unescape(encodeURIComponent(text)))}
      }));
    };
    ws.onmessage=(e)=>{
      const res=JSON.parse(e.data);
      if(res.data&&res.data.audio){
        const raw=atob(res.data.audio);
        const buf=new Uint8Array(raw.length);
        for(let i=0;i<raw.length;i++)buf[i]=raw.charCodeAt(i);
        chunks.push(buf);
      }
      if(res.data&&res.data.status===2){
        ws.close();
        const total=chunks.reduce((a,b)=>a+b.length,0);
        const merged=new Uint8Array(total);
        let offset=0;
        for(const c of chunks){merged.set(c,offset);offset+=c.length;}
        playPCM(merged,16000);
      }
    };
    ws.onerror=()=>{isSpeaking=false;micbtn.classList.remove('speaking');fallbackSpeak(text);};
  }).catch(()=>fallbackSpeak(text));
}

function playPCM(pcm,sr){
  const ctx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:sr});
  const s=new Int16Array(pcm.buffer);
  const f=new Float32Array(s.length);
  for(let i=0;i<s.length;i++)f[i]=s[i]/32768;
  const buf=ctx.createBuffer(1,f.length,sr);
  buf.getChannelData(0).set(f);
  const src=ctx.createBufferSource();
  src.buffer=buf;src.connect(ctx.destination);src.start();
  src.onended=()=>{isSpeaking=false;micbtn.classList.remove('speaking');vstate.textContent='按住麦克风说话，松开发送';};
}

function fallbackSpeak(text){
  const sy=window.speechSynthesis;sy.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='zh-CN';u.rate=0.92;u.pitch=1.1;
  const vs=sy.getVoices();
  const v=vs.find(v=>v.lang.includes('zh-CN'))||vs.find(v=>v.lang.includes('zh'));
  if(v)u.voice=v;
  u.onend=()=>{isSpeaking=false;micbtn.classList.remove('speaking');vstate.textContent='按住麦克风说话，松开发送';};
  sy.speak(u);
}

function addMsg(role,text){
  const div=document.createElement('div');div.className='msg '+(role==='user'?'user':'bot');
  const av=document.createElement('div');av.className='mav';av.textContent=role==='user'?'客':'若';
  const bub=document.createElement('div');bub.className='bub';bub.textContent=text;
  div.appendChild(av);div.appendChild(bub);msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}
function showTyping(){
  const div=document.createElement('div');div.className='msg bot';div.id='typing';
  div.innerHTML='<div class="mav">若</div><div class="bub"><div class="typing"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typing');if(t)t.remove();}

async function sendToAI(text){
  if(!text.trim())return;
  addMsg('user',text);history.push({role:'user',content:text});
  showTyping();vstate.textContent='陈若思考中…';
  try{
    const res=await fetch('https://api.deepseek.com/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({model:'deepseek-chat',max_tokens:300,messages:[{role:'system',content:SYSTEM},...history]})
    });
    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content||'（若有些出神，请再说一遍）';
    history.push({role:'assistant',content:reply});
    removeTyping();addMsg('bot',reply);speakXF(reply);
  }catch(e){
    removeTyping();const err='哎，网络出了点问题，容我缓一缓……';
    addMsg('bot',err);speakXF(err);vstate.textContent='按住麦克风说话，松开发送';
  }
}

function initSR(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){vstate.textContent='浏览器不支持语音识别，请打字发送';micbtn.style.opacity='0.4';micbtn.style.cursor='not-allowed';return;}
  recognition=new SR();recognition.lang='zh-CN';recognition.continuous=false;recognition.interimResults=true;
  recognition.onresult=(e)=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join('');
    vstate.textContent='「'+t+'」';
    if(e.results[e.results.length-1].isFinal){isRecording=false;micbtn.classList.remove('recording');sendToAI(t);}
  };
  recognition.onerror=(e)=>{isRecording=false;micbtn.classList.remove('recording');vstate.textContent=e.error==='not-allowed'?'请允许麦克风权限':'没听清，请再试一次';};
  recognition.onend=()=>{if(isRecording){isRecording=false;micbtn.classList.remove('recording');}};
}

keybtn.addEventListener('click',()=>{
  const k=keyinp.value.trim();
  if(!k.startsWith('sk-')){errtip.textContent='Key格式不对，应该以 sk- 开头';return;}
  apiKey=k;keyarea.style.display='none';guide.style.display='none';voicearea.style.display='block';
  msgs.innerHTML='';
  const divd=document.createElement('div');divd.className='divd';divd.textContent='— 陈若已就位 —';msgs.appendChild(divd);
  const opening='哟，来了。坐好，先别急着翻菜单——陌上花开，可缓缓归矣。今天几位？我替你想想点什么。';
  addMsg('bot',opening);history.push({role:'assistant',content:opening});
  setTimeout(()=>speakXF(opening),500);initSR();
});

micbtn.addEventListener('mousedown',()=>{if(!recognition||isSpeaking)return;isRecording=true;micbtn.classList.add('recording');vstate.textContent='正在听…';try{recognition.start();}catch(e){}});
micbtn.addEventListener('mouseup',()=>{if(!isRecording)return;try{recognition.stop();}catch(e){}});
micbtn.addEventListener('touchstart',(e)=>{e.preventDefault();if(!recognition||isSpeaking)return;isRecording=true;micbtn.classList.add('recording');vstate.textContent='正在听…';try{recognition.start();}catch(e){}},{passive:false});
micbtn.addEventListener('touchend',(e)=>{e.preventDefault();if(!isRecording)return;try{recognition.stop();}catch(e){}},{passive:false});

function sendText(){const t=txtinp.value.trim();if(!t||!apiKey)return;txtinp.value='';sendToAI(t);}
sndbtn.addEventListener('click',sendText);
txtinp.addEventListener('keydown',e=>{if(e.key==='Enter')sendText();});
keyinp.addEventListener('keydown',e=>{if(e.key==='Enter')keybtn.click();});
</script>
</body>
</html>
